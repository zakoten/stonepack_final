name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Fix stonecutter recipes
      run: python fix_stonecutter_recipes.py

    - name: Commit fixed recipes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add src/main/resources/data/stonepack/recipe
        git diff --cached --quiet || git commit -m "Auto-fix stonecutter recipes"
        git push    
    - name: Download gradle wrapper jar
      run: |
        mkdir -p gradle/wrapper
        curl -L "https://github.com/gradle/gradle/raw/v9.4.1/gradle/wrapper/gradle-wrapper.jar" \
          -o gradle/wrapper/gradle-wrapper.jar

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tramonto-stonepack
        path: build/libs/tramonto-stonepack-*.jar
        if-no-files-found: error
